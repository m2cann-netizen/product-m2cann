<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Number Generator</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    color:#222;
    text-align:center;
    padding:40px;
    overflow-x:hidden;
}

.container{
    position:relative;
    width:min(800px, 100%);
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header-container {
    display: flex;
    flex-direction:column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.header-container h1{
    margin:0;
    max-width:100%;
}

.local-lotteries{
    display:flex;
    width:100%;
    min-width:0;
    align-items:center;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    min-height:31px;
}

.lottery-item{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:5px 10px 5px 6px;
    color:#4c5561;
    background:#f5f7f8;
    border:1px solid #e3e7ea;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.lottery-icon{
    display:inline-flex;
    width:21px;
    height:21px;
    align-items:center;
    justify-content:center;
    color:#fff;
    background:linear-gradient(145deg, #ffcf33, #f29b13);
    border-radius:50%;
    box-shadow:inset -2px -2px 4px rgba(0,0,0,0.12);
    font-size:9px;
    font-weight:bold;
}

.lottery-item:nth-child(2) .lottery-icon{
    background:linear-gradient(145deg, #58a8f5, #286ac4);
}

.lottery-item:nth-child(3) .lottery-icon{
    background:linear-gradient(145deg, #72c879, #30904a);
}

.actions{
    display:flex;
    justify-content:center;
}

button,
.partnership-link{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1f3a2e;
    color:white;
    cursor:pointer;
}

.partnership-link{
    position:absolute;
    top:15px;
    left:15px;
    padding:11px 16px;
    font-size:14px;
    text-decoration:none;
}

.country-display{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    width:100px;
    align-items:center;
    flex-direction:column;
    gap:4px;
}

.flag-circle{
    display:flex;
    width:36px;
    height:36px;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#eef1f3;
    border:1px solid #d8dde1;
    border-radius:50%;
    font-size:24px;
    line-height:1;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.country-name{
    max-width:100px;
    overflow:hidden;
    color:#56606d;
    font-size:10px;
    font-weight:bold;
    line-height:1.15;
    text-overflow:ellipsis;
    white-space:nowrap;
}

button:hover,
.partnership-link:hover{
    background:#2d5744;
}

.set{
    margin-top:25px;
    padding:22px 15px;
    border:1px solid #ddd;
    border-radius:10px;
    min-height:82px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
}

.ball{
    display:inline-flex;
    width:62px;
    height:62px;
    border-radius:50%;
    background:#ffcc00;
    justify-content:center;
    align-items:center;
    margin:3px;
    font-weight:bold;
    font-size:24px;
    opacity:0;
    transform:scale(0.8);
}

.ball.show{
    opacity:1;
    transform:scale(1);
    animation:shake 0.28s ease-in-out;
}

.bonus{
    background:#4caf50;
    color:white;
}

@keyframes shake{
    0%{ transform:translateX(0) scale(1); }
    18%{ transform:translateX(-4px) scale(1.04); }
    36%{ transform:translateX(4px) scale(1.04); }
    54%{ transform:translateX(-3px) scale(1.02); }
    72%{ transform:translateX(3px) scale(1.01); }
    100%{ transform:translateX(0) scale(1); }
}

@media (max-width: 600px){
    body{
        padding:20px 12px;
    }

    .container{
        padding:82px 18px 24px;
        overflow:hidden;
    }

    .header-container{
        margin-bottom:20px;
    }

    .header-container h1{
        font-size:22px;
        line-height:1.2;
    }

    .country-display{
        right:10px;
        width:82px;
    }

    .country-name{
        max-width:82px;
    }

    .lottery-item{
        max-width:100%;
        font-size:12px;
    }

    .ball{
        width:48px;
        height:48px;
        font-size:19px;
    }
}
</style>
</head>

<body>

<div class="container">
    <a class="partnership-link" href="partnership.html">제휴문의</a>
    <div class="country-display" aria-live="polite">
        <span class="flag-circle" id="countryFlag" aria-hidden="true">🌐</span>
        <span class="country-name" id="countryName">Detecting...</span>
    </div>

    <div class="header-container">
        <h1>Lotto Number Generator</h1>
        <div class="local-lotteries" id="localLotteries" aria-label="Major local lotteries"></div>
    </div>

    <div class="actions">
        <button onclick="generateLottoSet()">Generate Numbers</button>
    </div>

    <div id="result"></div>
</div>

<script>

function createSet() {

    let nums = [];

    while(nums.length < 7){
        let n = Math.floor(Math.random()*45)+1;

        if(!nums.includes(n)){
            nums.push(n);
        }
    }

    let main = nums.slice(0,6).sort((a,b)=>a-b);
    let bonus = nums[6];

    return {main, bonus};
}

let audioContext;
let animationTimers = [];

const lotteryCatalog = {
    KR: ["Lotto 6/45", "Pension Lottery 720+", "Speetto 2000"],
    US: ["Powerball", "Mega Millions"],
    GB: ["Lotto", "EuroMillions", "Set For Life"],
    CA: ["Lotto Max", "Lotto 6/49", "Daily Grand"],
    AU: ["Powerball", "Oz Lotto", "Saturday Lotto"],
    JP: ["Loto 7", "Loto 6", "Mini Loto"],
    DE: ["LOTTO 6aus49", "Eurojackpot", "GlücksSpirale"],
    FR: ["Loto", "EuroMillions - My Million", "EuroDreams"],
    ES: ["La Primitiva", "Euromillones", "Bonoloto"],
    IT: ["SuperEnalotto", "Eurojackpot", "Lotto"],
    IE: ["Lotto", "EuroMillions", "Daily Million"],
    NZ: ["Lotto", "Powerball", "Strike"]
};

function countryCodeToFlag(countryCode){
    if(!/^[A-Z]{2}$/.test(countryCode)){
        return "🌐";
    }

    return [...countryCode]
        .map(character=>String.fromCodePoint(127397 + character.charCodeAt()))
        .join("");
}

function getCountryEnglishName(countryCode, fallbackName = ""){
    try{
        let names = new Intl.DisplayNames(["en"], {type:"region"});
        return names.of(countryCode) || fallbackName || countryCode;
    }catch(error){
        return fallbackName || countryCode;
    }
}

function getLocaleCountryCode(){
    let locale = navigator.language || "";
    let match = locale.match(/[-_]([A-Za-z]{2})$/);
    return match ? match[1].toUpperCase() : "KR";
}

function renderCountry(countryCode, suppliedName = ""){
    let code = /^[A-Z]{2}$/.test(countryCode) ? countryCode : getLocaleCountryCode();
    let countryName = getCountryEnglishName(code, suppliedName);
    let lotteries = (lotteryCatalog[code] || []).slice(0, 3);

    document.getElementById("countryFlag").textContent = countryCodeToFlag(code);
    document.getElementById("countryName").textContent = countryName;

    let lotteryContainer = document.getElementById("localLotteries");
    lotteryContainer.innerHTML = "";

    lotteries.forEach((lottery, index)=>{
        let item = document.createElement("span");
        item.className = "lottery-item";

        let icon = document.createElement("span");
        icon.className = "lottery-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = index + 1;

        let name = document.createElement("span");
        name.textContent = lottery;

        item.append(icon, name);
        lotteryContainer.appendChild(item);
    });
}

async function detectVisitorCountry(){
    let fallbackCode = getLocaleCountryCode();
    let controller = new AbortController();
    let timeout = setTimeout(()=>controller.abort(), 3500);

    try{
        let response = await fetch("https://ipwho.is/", {signal:controller.signal});
        let location = await response.json();

        if(response.ok && location.success !== false && location.country_code){
            renderCountry(location.country_code.toUpperCase(), location.country);
            return;
        }
    }catch(error){
        // Browser locale is used when IP-based detection is unavailable.
    }finally{
        clearTimeout(timeout);
    }

    renderCountry(fallbackCode);
}

function prepareAudio(){
    let AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if(!AudioContextClass){
        return null;
    }

    audioContext = audioContext || new AudioContextClass();

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }

    return audioContext;
}

function playShakeSound(){
    let context = prepareAudio();

    if(!context){
        return;
    }

    let oscillator = audioContext.createOscillator();
    let gain = audioContext.createGain();
    let now = audioContext.currentTime;

    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(90, now);
    oscillator.frequency.linearRampToValueAtTime(140, now + 0.06);
    oscillator.frequency.linearRampToValueAtTime(75, now + 0.12);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start(now);
    oscillator.stop(now + 0.15);
}

function playBonusSound(){
    let context = prepareAudio();

    if(!context){
        return;
    }

    let oscillator = context.createOscillator();
    let gain = context.createGain();
    let now = context.currentTime;

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(520, now);
    oscillator.frequency.exponentialRampToValueAtTime(980, now + 0.22);
    oscillator.frequency.exponentialRampToValueAtTime(760, now + 0.45);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.04);
    gain.gain.setValueAtTime(0.12, now + 0.24);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.48);

    oscillator.connect(gain);
    gain.connect(context.destination);
    oscillator.start(now);
    oscillator.stop(now + 0.5);
}

function clearAnimationTimers(){
    animationTimers.forEach(timer=>clearTimeout(timer));
    animationTimers = [];
}

function revealElement(element, delay, shouldPlaySound = true, soundPlayer = playShakeSound){
    let timer = setTimeout(()=>{
        element.classList.add("show");

        if(shouldPlaySound){
            soundPlayer();
        }
    }, delay);

    animationTimers.push(timer);
}

function generateLottoSet(shouldPlaySound = true){

    let result = document.getElementById("result");
    let set = createSet();
    clearAnimationTimers();

    if(shouldPlaySound){
        prepareAudio();
    }

    result.innerHTML = `<div class="set" id="numberSet"></div>`;
    let numberSet = document.getElementById("numberSet");

    set.main.forEach((num, index)=>{
        let ball = document.createElement("span");
        ball.className = "ball";
        ball.textContent = num;
        numberSet.appendChild(ball);
        revealElement(ball, index * 500, shouldPlaySound);
    });

    let bonusBall = document.createElement("span");
    bonusBall.className = "ball bonus";
    bonusBall.textContent = set.bonus;
    numberSet.appendChild(bonusBall);
    let bonusDelay = (set.main.length - 1) * 500 + 1000;
    revealElement(bonusBall, bonusDelay, shouldPlaySound, playBonusSound);
}

generateLottoSet(false);
detectVisitorCountry();

</script>

</body>
</html>
