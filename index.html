<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Number Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    color:#222;
    text-align:center;
    padding:40px;
}

.container{
    position:relative;
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.lotto-icon {
    width: 40px;
    height: 40px;
}

.actions{
    display:flex;
    justify-content:center;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1f3a2e;
    color:white;
    cursor:pointer;
}

.theme-toggle{
    position:absolute;
    top:15px;
    right:15px;
    width:90px;
    height:42px;
    padding:8px 14px;
    font-size:14px;
    border-radius:8px;
}

button:hover{
    background:#2d5744;
}

.set{
    margin-top:25px;
    padding:22px 15px;
    border:1px solid #ddd;
    border-radius:10px;
    min-height:82px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
}

.ball{
    display:inline-flex;
    width:62px;
    height:62px;
    border-radius:50%;
    background:#ffcc00;
    justify-content:center;
    align-items:center;
    margin:3px;
    font-weight:bold;
    font-size:24px;
    opacity:0;
    transform:scale(0.8);
}

.ball.show{
    opacity:1;
    transform:scale(1);
    animation:shake 0.28s ease-in-out;
}

.bonus{
    background:#4caf50;
    color:white;
}

.plus{
    display:inline-flex;
    align-items:center;
    min-height:62px;
    font-size:32px;
    margin:0 8px;
    opacity:0;
}

.plus.show{
    opacity:1;
}

@keyframes shake{
    0%{ transform:translateX(0) scale(1); }
    18%{ transform:translateX(-4px) scale(1.04); }
    36%{ transform:translateX(4px) scale(1.04); }
    54%{ transform:translateX(-3px) scale(1.02); }
    72%{ transform:translateX(3px) scale(1.01); }
    100%{ transform:translateX(0) scale(1); }
}

body.dark{
    background:#111;
    color:white;
}

body.dark .container{
    background:#222;
    box-shadow:0 5px 15px rgba(255,255,255,0.08);
}

body.dark .set{
    border-color:#444;
}
</style>
</head>

<body>

<div class="container">
    <button class="theme-toggle" id="themeButton" onclick="toggleTheme()">Black</button>

    <div class="header-container">
        <img src="https://img.icons8.com/color/96/lottery-ticket.png" alt="Lotto Ticket" class="lotto-icon">
        <h1>Lotto Number Generator</h1>
    </div>

    <div class="actions">
        <button onclick="generateLottoSet()">Generate Numbers</button>
    </div>

    <div id="result"></div>
</div>

<script>

function createSet() {

    let nums = [];

    while(nums.length < 7){
        let n = Math.floor(Math.random()*45)+1;

        if(!nums.includes(n)){
            nums.push(n);
        }
    }

    let main = nums.slice(0,6).sort((a,b)=>a-b);
    let bonus = nums[6];

    return {main, bonus};
}

let audioContext;
let animationTimers = [];

function playShakeSound(){
    let AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if(!AudioContextClass){
        return;
    }

    audioContext = audioContext || new AudioContextClass();

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }

    let oscillator = audioContext.createOscillator();
    let gain = audioContext.createGain();
    let now = audioContext.currentTime;

    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(90, now);
    oscillator.frequency.linearRampToValueAtTime(140, now + 0.06);
    oscillator.frequency.linearRampToValueAtTime(75, now + 0.12);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start(now);
    oscillator.stop(now + 0.15);
}

function clearAnimationTimers(){
    animationTimers.forEach(timer=>clearTimeout(timer));
    animationTimers = [];
}

function revealElement(element, delay, shouldPlaySound = true){
    let timer = setTimeout(()=>{
        element.classList.add("show");

        if(shouldPlaySound){
            playShakeSound();
        }
    }, delay);

    animationTimers.push(timer);
}

function generateLottoSet(shouldPlaySound = true){

    let result = document.getElementById("result");
    let set = createSet();
    clearAnimationTimers();

    result.innerHTML = `<div class="set" id="numberSet"></div>`;
    let numberSet = document.getElementById("numberSet");

    set.main.forEach((num, index)=>{
        let ball = document.createElement("span");
        ball.className = "ball";
        ball.textContent = num;
        numberSet.appendChild(ball);
        revealElement(ball, index * 500, shouldPlaySound);
    });

    let plus = document.createElement("span");
    plus.className = "plus";
    plus.textContent = "+";
    numberSet.appendChild(plus);
    revealElement(plus, set.main.length * 500, false);

    let bonusBall = document.createElement("span");
    bonusBall.className = "ball bonus";
    bonusBall.textContent = set.bonus;
    numberSet.appendChild(bonusBall);
    revealElement(bonusBall, (set.main.length + 1) * 500, shouldPlaySound);
}

function toggleTheme(){
    let isDark = document.body.classList.toggle("dark");
    document.getElementById("themeButton").textContent = isDark ? "White" : "Black";
}

generateLottoSet(false);

</script>

</body>
</html>
