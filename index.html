<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="새로운 비즈니스 기회를 위한 제휴 문의 페이지입니다.">
    <title>제휴 문의</title>
    <style>
        :root {
            --navy: #14213d;
            --blue: #3157d5;
            --blue-dark: #2446b5;
            --blue-soft: #eef2ff;
            --text: #172033;
            --muted: #687086;
            --line: #dfe3eb;
            --surface: #ffffff;
            --background: #f5f7fb;
            --danger: #c63434;
            --success: #16794b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 5%, rgba(49, 87, 213, 0.1), transparent 25rem),
                var(--background);
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .page {
            display: grid;
            grid-template-columns: minmax(280px, 0.75fr) minmax(420px, 1.25fr);
            width: min(1120px, calc(100% - 40px));
            min-height: 700px;
            margin: 64px auto;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid rgba(20, 33, 61, 0.08);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(26, 39, 72, 0.12);
        }

        .intro {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 56px 48px;
            overflow: hidden;
            color: #fff;
            background: var(--navy);
        }

        .intro::before,
        .intro::after {
            position: absolute;
            content: "";
            border-radius: 999px;
            pointer-events: none;
        }

        .intro::before {
            top: -100px;
            right: -120px;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .intro::after {
            right: -80px;
            bottom: 70px;
            width: 220px;
            height: 220px;
            background: rgba(75, 111, 230, 0.22);
        }

        .brand,
        .intro-copy,
        .process {
            position: relative;
            z-index: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .brand-mark {
            display: grid;
            width: 38px;
            height: 38px;
            place-items: center;
            border-radius: 12px;
            background: var(--blue);
        }

        .brand-mark svg {
            width: 20px;
            height: 20px;
        }

        .eyebrow {
            margin: 0 0 14px;
            color: #9db1ff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .intro h1 {
            max-width: 360px;
            margin: 0;
            font-size: clamp(36px, 4vw, 52px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .intro-copy > p:last-child {
            max-width: 380px;
            margin: 22px 0 0;
            color: #bfc8da;
            font-size: 16px;
        }

        .process {
            display: flex;
            gap: 10px;
            align-items: center;
            color: #aeb8cc;
            font-size: 13px;
        }

        .process strong {
            color: #fff;
            font-weight: 600;
        }

        .process span {
            color: #66738f;
        }

        .form-panel {
            padding: 52px 58px;
        }

        .form-header {
            margin-bottom: 30px;
        }

        .form-header h2 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: -0.03em;
        }

        .form-header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .required-note {
            color: var(--blue);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label,
        legend {
            color: #293249;
            font-size: 14px;
            font-weight: 650;
        }

        .required {
            margin-left: 2px;
            color: var(--blue);
        }

        input,
        select,
        textarea {
            width: 100%;
            color: var(--text);
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 11px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input,
        select {
            height: 49px;
            padding: 0 14px;
        }

        textarea {
            min-height: 150px;
            padding: 13px 14px;
            resize: vertical;
        }

        input::placeholder,
        textarea::placeholder {
            color: #a0a7b6;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(49, 87, 213, 0.1);
        }

        .privacy {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 22px;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
        }

        .privacy input {
            flex: 0 0 auto;
            width: 17px;
            height: 17px;
            margin-top: 2px;
            accent-color: var(--blue);
        }

        .form-footer {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-top: 26px;
        }

        .submit-button {
            display: inline-flex;
            flex: 0 0 auto;
            gap: 9px;
            align-items: center;
            justify-content: center;
            min-width: 164px;
            height: 52px;
            padding: 0 24px;
            color: #fff;
            font-weight: 700;
            background: var(--blue);
            border: 0;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .submit-button:hover {
            background: var(--blue-dark);
            transform: translateY(-1px);
        }

        .submit-button:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }

        .submit-button svg {
            width: 17px;
            height: 17px;
        }

        .form-status {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .form-status.success {
            color: var(--success);
            font-weight: 600;
        }

        .form-status.error {
            color: var(--danger);
            font-weight: 600;
        }

        .honeypot {
            position: absolute;
            left: -9999px;
        }

        @media (max-width: 820px) {
            .page {
                grid-template-columns: 1fr;
                margin: 24px auto;
            }

            .intro {
                min-height: 350px;
                padding: 38px 34px;
            }

            .intro-copy {
                margin: 50px 0;
            }

            .process {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 560px) {
            .page {
                width: 100%;
                margin: 0;
                border: 0;
                border-radius: 0;
            }

            .intro {
                min-height: 330px;
                padding: 30px 24px;
            }

            .form-panel {
                padding: 36px 22px 48px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 17px;
            }

            .field.full {
                grid-column: auto;
            }

            .form-footer {
                align-items: stretch;
                flex-direction: column;
            }

            .submit-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="intro" aria-labelledby="page-title">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 12h12M12 6l6 6-6 6"/>
                    </svg>
                </span>
                PARTNERSHIP
            </div>

            <div class="intro-copy">
                <p class="eyebrow">Grow together</p>
                <h1 id="page-title">함께 더 큰 가능성을 만들어가요.</h1>
                <p>브랜드 제휴, 공동 마케팅, 콘텐츠 협업 등 새로운 제안을 기다리고 있습니다.</p>
            </div>

            <div class="process" aria-label="제휴 진행 절차">
                <strong>문의 접수</strong><span>→</span>
                <strong>담당자 검토</strong><span>→</span>
                <strong>개별 회신</strong>
            </div>
        </section>

        <section class="form-panel" aria-labelledby="form-title">
            <div class="form-header">
                <h2 id="form-title">제휴 문의하기</h2>
                <p><span class="required-note">*</span> 표시는 필수 입력 항목입니다.</p>
            </div>

            <form id="partnership-form" action="https://formspree.io/f/xjgqvwze" method="POST">
                <div class="form-grid">
                    <div class="field">
                        <label for="company">회사명 / 브랜드명<span class="required">*</span></label>
                        <input id="company" name="company" type="text" placeholder="회사 또는 브랜드명" autocomplete="organization" required>
                    </div>

                    <div class="field">
                        <label for="name">담당자명<span class="required">*</span></label>
                        <input id="name" name="name" type="text" placeholder="담당자 이름" autocomplete="name" required>
                    </div>

                    <div class="field">
                        <label for="email">이메일<span class="required">*</span></label>
                        <input id="email" name="email" type="email" placeholder="name@company.com" autocomplete="email" required>
                    </div>

                    <div class="field">
                        <label for="phone">연락처</label>
                        <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" autocomplete="tel">
                    </div>

                    <div class="field full">
                        <label for="partnership-type">제휴 유형<span class="required">*</span></label>
                        <select id="partnership-type" name="partnership_type" required>
                            <option value="" selected disabled>제휴 유형을 선택해 주세요</option>
                            <option value="브랜드 제휴">브랜드 제휴</option>
                            <option value="공동 마케팅">공동 마케팅</option>
                            <option value="콘텐츠 협업">콘텐츠 협업</option>
                            <option value="서비스 연동">서비스 연동</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>

                    <div class="field full">
                        <label for="message">제안 내용<span class="required">*</span></label>
                        <textarea id="message" name="message" placeholder="제휴 목적, 진행 방식, 일정 등 제안 내용을 자세히 작성해 주세요." required></textarea>
                    </div>
                </div>

                <div class="honeypot" aria-hidden="true">
                    <label for="website">웹사이트</label>
                    <input id="website" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                </div>

                <label class="privacy" for="privacy">
                    <input id="privacy" name="privacy_agreement" type="checkbox" value="동의" required>
                    <span>문의 접수 및 답변을 위한 개인정보 수집·이용에 동의합니다. 입력한 정보는 문의 처리 목적으로만 사용됩니다.</span>
                </label>

                <input type="hidden" name="_subject" value="새로운 제휴 문의가 도착했습니다">

                <div class="form-footer">
                    <button class="submit-button" type="submit">
                        <span>문의 보내기</span>
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m5 12 14-7-4 14-3-6-7-1Z"/>
                            <path d="m12 13 7-8"/>
                        </svg>
                    </button>
                    <p id="form-status" class="form-status" role="status" aria-live="polite">접수 후 영업일 기준 2~3일 내 회신드립니다.</p>
                </div>
            </form>
        </section>
    </main>

    <script>
        const form = document.getElementById("partnership-form");
        const status = document.getElementById("form-status");
        const submitButton = form.querySelector(".submit-button");
        const buttonLabel = submitButton.querySelector("span");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!form.reportValidity()) {
                return;
            }

            submitButton.disabled = true;
            buttonLabel.textContent = "전송 중...";
            status.className = "form-status";
            status.textContent = "문의 내용을 전송하고 있습니다.";

            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: new FormData(form),
                    headers: {
                        "Accept": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Form submission failed");
                }

                form.reset();
                status.className = "form-status success";
                status.textContent = "문의가 접수되었습니다. 담당자가 확인 후 연락드리겠습니다.";
            } catch (error) {
                status.className = "form-status error";
                status.textContent = "전송에 실패했습니다. 잠시 후 다시 시도해 주세요.";
            } finally {
                submitButton.disabled = false;
                buttonLabel.textContent = "문의 보내기";
            }
        });
    </script>
</body>
</html>
